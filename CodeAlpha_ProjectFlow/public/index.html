<div class="toast-wrap" id="toastWrap"></div>

<script>
let currentUser = null;
let currentProject = null;
let projects = [];
let tasks = [];
let currentTask = null;
let activeView = 'dash';
let isRegistering = false;
let ws = null;

const colors = ['#5b6af0', '#7c3aed', '#06b6d4', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#64748b'];
let selectedColor = colors[0];

// ── TOAST MESSAGES ──
function toast(message, type = '') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type === 'success' ? 'green' : type === 'error' ? 'red' : ''}`;
  el.innerHTML = `<span>${message}</span>`;
  wrap.appendChild(el);
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 250);
  }, 3000);
}

// ── AUTH LOOP STATE CONTROLLER ──
function toggleAuth() {
  isRegistering = !isRegistering;
  document.getElementById('authMsg').innerHTML = '';
  document.getElementById('aNameG').style.display = isRegistering ? 'block' : 'none';
  document.getElementById('authTitle').textContent = isRegistering ? 'Create an account' : 'Welcome back';
  document.getElementById('authSub').textContent = isRegistering ? 'Get started with your free workspace' : 'Sign in to your workspace';
  document.getElementById('aBtn').textContent = isRegistering ? 'Sign up' : 'Sign in';
  document.getElementById('aToggle').textContent = isRegistering ? 'Already have an account? Sign in' : "Don't have an account? Create one";
}

async function handleAuth() {
  const email = document.getElementById('aEmail').value.trim();
  const password = document.getElementById('aPass').value;
  const name = document.getElementById('aName').value.trim();
  const msgEl = document.getElementById('authMsg');

  if (!email || !password || (isRegistering && !name)) {
    msgEl.innerHTML = `<div class="msg error">Please fill in all layout blocks.</div>`;
    return;
  }

  const endpoint = isRegistering ? '/api/auth/register' : '/api/auth/login';
  const payload = isRegistering ? { name, email, password } : { email, password };

  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (!res.ok) {
      msgEl.innerHTML = `<div class="msg error">${data.error || 'Authentication error.'}</div>`;
      return;
    }

    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    toast(isRegistering ? 'Account built successfully.' : 'Logged in successfully.', 'success');
    
    // REDIRECTION ENGINE INJECTION RUNTIME EXECUTION
    setTimeout(() => {
      initApp();
    }, 600);

  } catch (err) {
    msgEl.innerHTML = `<div class="msg error">Connection connection pipeline crash.</div>`;
  }
}

function logoutUser() {
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  if(ws) { ws.close(); ws = null; }
  currentUser = null;
  document.getElementById('appView').classList.remove('active');
  document.getElementById('authView').classList.add('active');
  document.getElementById('aPass').value = '';
}

// ── OVERLAYS MANAGEMENT ──
function openOverlay(id) { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
function closeBd(e, id) { if(e.target.id === id) closeOverlay(id); }

// ── INITIALIZATION INTERCEPTOR ──
async function initApp() {
  const token = localStorage.getItem('token');
  const userStr = localStorage.getItem('user');

  if (!token || !userStr) {
    document.getElementById('appView').classList.remove('active');
    document.getElementById('authView').classList.add('active');
    return;
  }

  currentUser = JSON.parse(userStr);
  document.getElementById('authView').classList.remove('active');
  document.getElementById('appView').classList.add('active');

  // Setup Sidebar User Info
  document.getElementById('sidebarName').textContent = currentUser.name;
  document.getElementById('sidebarRole').textContent = currentUser.email;
  document.getElementById('sidebarAv').textContent = currentUser.avatar || '👤';

  initWebSocket(token);
  await loadProjects();
  showDash();
  loadNotifications();
}

// ── WEBSOCKET LIVE SYNCHRONIZATION RUNTIME ──
function initWebSocket(token) {
  const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${window.location.host}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'auth', token }));
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type === 'notification') {
        toast(msg.message, 'success');
        loadNotifications();
      } else if (currentProject) {
        if (msg.type === 'task_created' && msg.task.project_id == currentProject.id) {
          tasks.push(msg.task);
          if (activeView === 'board') renderBoard();
        } else if (msg.type === 'task_updated' && msg.task.project_id == currentProject.id) {
          tasks = tasks.map(t => t.id == msg.task.id ? msg.task : t);
          if (activeView === 'board') {
            renderBoard();
            if (currentTask && currentTask.id == msg.task.id) {
              loadTaskDetails(msg.task.id);
            }
          }
        } else if (msg.type === 'task_deleted' && msg.project_id == currentProject.id || msg.type === 'task_deleted') {
          tasks = tasks.filter(t => t.id != msg.taskId);
          if (activeView === 'board') {
            renderBoard();
            if (currentTask && currentTask.id == msg.taskId) closeOverlay('taskOverlay');
          }
        } else if (msg.type === 'new_comment' && currentTask && currentTask.id == msg.taskId) {
          loadComments(currentTask.id);
        }
      }
    } catch(err) {}
  };

  ws.onclose = () => {
    setTimeout(() => { if(localStorage.getItem('token')) initWebSocket(token); }, 5000);
  };
}

// ── PROJECTS PIPELINE VIA AJAX API ──
async function loadProjects() {
  try {
    const res = await fetch('/api/projects', {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    const data = await res.json();
    projects = data.projects || [];
    renderSidebarProjects();
  } catch(err) { toast('Error loading dashboard structures', 'error'); }
}

function renderSidebarProjects() {
  const container = document.getElementById('sidebarProjects');
  container.innerHTML = '';
  projects.forEach(p => {
    const btn = document.createElement('button');
    btn.className = `nav-item ${currentProject && currentProject.id === p.id && activeView === 'board' ? 'active' : ''}`;
    btn.onclick = () => showProject(p.id);
    btn.innerHTML = `
      <span style="width:8px;height:8px;border-radius:50%;background:${p.color || 'var(--accent)'};flex-shrink:0"></span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
    `;
    container.appendChild(btn);
  });
}

function showDash() {
  activeView = 'dash';
  currentProject = null;
  renderSidebarProjects();
  document.getElementById('navDash').classList.add('active');

  const main = document.getElementById('mainArea');
  main.innerHTML = `
    <div class="topbar">
      <div class="topbar-title">Overview Workspace</div>
      <div class="topbar-dot" style="background:var(--green)"></div>
    </div>
    <div class="dash-content">
      <div class="dash-hero">
        <div class="dash-hero-label">Live Project Tracking Platform</div>
        <h1>Welcome back, ${currentUser.name}</h1>
        <p>Coordinate deployment objectives, assign tickets, and inspect dynamic timeline parameters metrics live.</p>
        <button class="btn btn-primary" onclick="openNewProjectModal()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Build Workspace Flow
        </button>
      </div>

      <div class="section-title">Platform Scope</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num">${projects.length}</div><div class="stat-label">Active Modules</div></div>
        <div class="stat-card"><div class="stat-num" id="dashTotalTasks">-</div><div class="stat-label">Tickets Tracked</div></div>
        <div class="stat-card"><div class="stat-num" id="dashPendingTasks">-</div><div class="stat-label">In Progress</div></div>
      </div>

      <div class="section-title">Active Projects Workspace</div>
      <div class="project-cards-grid" id="dashProjectsGrid"></div>
    </div>
  `;

  renderDashProjects();
  calculateGlobalStats();
}

function calculateGlobalStats() {
  let total = 0;
  let pending = 0;
  projects.forEach(p => {
    total += p.task_count || 0;
  });
  document.getElementById('dashTotalTasks').textContent = total;
  
  // Asynchronously query aggregate tracking values if available
  fetch('/api/notifications', { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } })
    .then(r => r.json())
    .then(d => {
      let unreadCount = (d.notifications || []).filter(n => !n.is_read).length;
      document.getElementById('dashPendingTasks').textContent = unreadCount;
    }).catch(()=>{});
}

function renderDashProjects() {
  const grid = document.getElementById('dashProjectsGrid');
  grid.innerHTML = '';

  if(projects.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><p>No current project workflows mapped into memory database registry.</p></div>`;
    return;
  }

  projects.forEach(p => {
    const card = document.createElement('div');
    card.className = 'project-card';
    card.onclick = () => showProject(p.id);
    card.innerHTML = `
      <div class="project-card-accent" style="background:${p.color}"></div>
      <button class="btn btn-icon project-card-del" onclick="event.stopPropagation(); deleteProject(${p.id})" title="Delete project Module">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
      <div class="project-card-name">${p.name}</div>
      <div class="project-card-desc">${p.description || 'No descriptive overview recorded.'}</div>
      <div class="project-card-meta">
        <span style="display:inline-flex;align-items:center;gap:4px">📦 ${p.task_count || 0} tasks</span>
        <span style="display:inline-flex;align-items:center;gap:4px">👥 ${p.member_count || 1} users</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

function openNewProjectModal() {
  document.getElementById('npMsg').innerHTML = '';
  document.getElementById('npName').value = '';
  document.getElementById('npDesc').value = '';
  
  const container = document.getElementById('npColors');
  container.innerHTML = '';
  colors.forEach(c => {
    const s = document.createElement('div');
    s.className = `color-swatch ${selectedColor === c ? 'selected' : ''}`;
    s.style.background = c;
    s.onclick = () => {
      selectedColor = c;
      openNewProjectModal();
    };
    container.appendChild(s);
  });
  openOverlay('newProjectOverlay');
}

async function submitProject() {
  const name = document.getElementById('npName').value.trim();
  const description = document.getElementById('npDesc').value.trim();

  if(!name) {
    document.getElementById('npMsg').innerHTML = `<div class="msg error">Module header name mandatory.</div>`;
    return;
  }

  try {
    const res = await fetch('/api/projects', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('token')}`
      },
      body: JSON.stringify({ name, description, color: selectedColor })
    });
    
    if(res.ok) {
      closeOverlay('newProjectOverlay');
      toast('Dynamic project registry recorded.', 'success');
      await loadProjects();
      if(activeView === 'dash') showDash();
    } else {
      const data = await res.json();
      document.getElementById('npMsg').innerHTML = `<div class="msg error">${data.error || 'Pipeline creation failure.'}</div>`;
    }
  } catch(err) { toast('Execution endpoint crash.', 'error'); }
}

async function deleteProject(id) {
  if(!confirm('Purge target workspace? All nested boards and columns will explode.')) return;
  try {
    const res = await fetch(`/api/projects/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    if(res.ok) {
      toast('Workspace tracking data purged.', 'success');
      await loadProjects();
      if(activeView === 'dash') showDash();
    }
  } catch(err) { toast('Purge operation disrupted.', 'error'); }
}

// ── KANBAN PROJECT VIEW INTERFACES ──
async function showProject(id) {
  activeView = 'board';
  document.getElementById('navDash').classList.remove('active');
  
  try {
    const token = localStorage.getItem('token');
    const pRes = await fetch(`/api/projects/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
    if(!pRes.ok) throw new Error();
    const pData = await pRes.json();
    currentProject = pData.project;
    currentProject.members = pData.members;

    renderSidebarProjects();

    const main = document.getElementById('mainArea');
    main.innerHTML = `
      <div class="topbar">
        <div class="topbar-dot" style="background:${currentProject.color}"></div>
        <div class="topbar-title">${currentProject.name}</div>
        <button class="btn btn-secondary btn-sm" onclick="openMembersModal()">👥 Management (${currentProject.members.length})</button>
      </div>
      <div class="board-layout">
        <div class="board-columns-wrap" id="boardColumnsWrap"></div>
      </div>
    `;

    const tRes = await fetch(`/api/projects/${id}/tasks`, { headers: { 'Authorization': `Bearer ${token}` } });
    const tData = await tRes.json();
    tasks = tData.tasks || [];
    renderBoard();

  } catch(err) {
    toast('Access denied or node down.', 'error');
    showDash();
  }
}

function renderBoard() {
  const container = document.getElementById('boardColumnsWrap');
  container.innerHTML = '';

  const columns = [
    { id: 'todo', name: 'To Do', color: 'var(--text-3)' },
    { id: 'inprogress', name: 'In Progress', color: 'var(--accent)' },
    { id: 'review', name: 'Code Review', color: 'var(--yellow)' },
    { id: 'done', name: 'Completed Done', color: 'var(--green)' }
  ];

  columns.forEach(col => {
    const colTasks = tasks.filter(t => t.status === col.id);
    const colEl = document.createElement('div');
    colEl.className = 'kanban-col';
    colEl.innerHTML = `
      <div class="col-header">
        <span class="col-dot" style="background:${col.color}"></span>
        <span class="col-name">${col.name}</span>
        <span class="col-count">${colTasks.length}</span>
        <button class="col-add-btn" onclick="openAddTaskModal('${col.id}')" title="Append ticket stream tracking context">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="col-body" id="col-body-${col.id}"></div>
    `;
    container.appendChild(colEl);

    const bodyEl = document.getElementById(`col-body-${col.id}`);
    if(colTasks.length === 0) {
      bodyEl.innerHTML = `<div class="col-empty">Vacant block container</div>`;
    } else {
      colTasks.forEach(t => {
        const tCard = document.createElement('div');
        tCard.className = 'task-card';
        tCard.onclick = () => openTaskDetailsModal(t.id);
        
        let dateBadge = '';
        if(t.due_date) {
          const isOverdue = new Date(t.due_date) < new Date() && t.status !== 'done';
          dateBadge = `<div class="task-card-due ${isOverdue ? 'overdue' : ''}">⏳ ${t.due_date}</div>`;
        }

        tCard.innerHTML = `
          <div class="task-card-priority priority-${t.priority}">${t.priority}</div>
          <div class="task-card-title">${t.title}</div>
          <div class="task-card-footer">
            <div class="task-card-assignee">👤 ${t.assignee_name || 'Unassigned'}</div>
            ${dateBadge}
          </div>
        `;
        bodyEl.appendChild(tCard);
      });
    }
  });
}

// ── TASK DISPATCHER AND COMMENT MANAGEMENT ──
function openAddTaskModal(statusId) {
  document.getElementById('ntMsg').innerHTML = '';
  document.getElementById('ntTitle').value = '';
  document.getElementById('ntDesc').value = '';
  document.getElementById('ntDue').value = '';
  document.getElementById('ntStatus').value = statusId;
  
  const select = document.getElementById('ntAssignee');
  select.innerHTML = '<option value="">Unassigned</option>';
  currentProject.members.forEach(m => {
    select.innerHTML += `<option value="${m.id}">${m.name}</option>`;
  });

  openOverlay('newTaskOverlay');
}

async function submitTask() {
  const title = document.getElementById('ntTitle').value.trim();
  const description = document.getElementById('ntDesc').value.trim();
  const status = document.getElementById('ntStatus').value;
  const priority = document.getElementById('ntPriority').value;
  const due_date = document.getElementById('ntDue').value;
  const assignee_id = document.getElementById('ntAssignee').value;

  if(!title) {
    document.getElementById('ntMsg').innerHTML = `<div class="msg error">Task ticket descriptor mandatory.</div>`;
    return;
  }

  try {
    const res = await fetch(`/api/projects/${currentProject.id}/tasks`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('token')}`
      },
      body: JSON.stringify({ title, description, status, priority, due_date, assignee_id })
    });
    if(res.ok) {
      closeOverlay('newTaskOverlay');
      toast('Dynamic structural task allocated.', 'success');
      // Synchronization handler triggers automatically via WebSocket messaging pipelines
    }
  } catch(err) { toast('Error parsing configuration stream.', 'error'); }
}

async function openTaskDetailsModal(taskId) {
  currentTask = tasks.find(t => t.id == taskId);
  document.getElementById('taskModalMsg').innerHTML = '';
  openOverlay('taskOverlay');
  await loadTaskDetails(taskId);
}

async function loadTaskDetails(taskId) {
  try {
    const res = await fetch(`/api/projects/${currentProject.id}/tasks`, {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    const data = await res.json();
    const freshTasks = data.tasks || [];
    currentTask = freshTasks.find(t => t.id == taskId);
    if(!currentTask) return;

    document.getElementById('tModalTitle').textContent = `Ticket Registry [ID: #${currentTask.id}]`;
    document.getElementById('tModalTitleInput').value = currentTask.title;
    document.getElementById('tModalDescInput').value = currentTask.description || '';
    
    const statusB = document.getElementById('tModalStatusBadge');
    statusB.className = `badge badge-${currentTask.status}`;
    statusB.textContent = currentTask.status;

    const prioB = document.getElementById('tModalPriorityBadge');
    prioB.className = `badge priority-${currentTask.priority}`;
    prioB.textContent = currentTask.priority;

    document.getElementById('tModalAssignee').textContent = currentTask.assignee_name || 'Unassigned';
    document.getElementById('tModalDue').textContent = currentTask.due_date || 'No scheduled cutoff window.';

    document.getElementById('tModalStatusSelect').value = currentTask.status;
    document.getElementById('tModalPrioritySelect').value = currentTask.priority;
    document.getElementById('tModalDueInput').value = currentTask.due_date || '';

    const aSelect = document.getElementById('tModalAssigneeSelect');
    aSelect.innerHTML = '<option value="">Unassigned</option>';
    currentProject.members.forEach(m => {
      aSelect.innerHTML += `<option value="${m.id}" ${currentTask.assignee_id == m.id ? 'selected' : ''}>${m.name}</option>`;
    });

    loadComments(taskId);
  } catch(err) {}
}

async function updateCurrentTask() {
  const title = document.getElementById('tModalTitleInput').value.trim();
  const description = document.getElementById('tModalDescInput').value.trim();
  const status = document.getElementById('tModalStatusSelect').value;
  const priority = document.getElementById('tModalPrioritySelect').value;
  const due_date = document.getElementById('tModalDueInput').value;
  const assignee_id = document.getElementById('tModalAssigneeSelect').value;

  if(!title) {
    document.getElementById('taskModalMsg').innerHTML = `<div class="msg error">Title is mandatory.</div>`;
    return;
  }

  try {
    const res = await fetch(`/api/projects/${currentProject.id}/tasks/${currentTask.id}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('token')}`
      },
      body: JSON.stringify({ title, description, status, priority, due_date, assignee_id: assignee_id || null })
    });
    if(res.ok) {
      toast('Task tracking changes synced.', 'success');
      closeOverlay('taskOverlay');
    }
  } catch(err) { toast('Error targeting database update query sync.', 'error'); }
}

async function deleteCurrentTask() {
  if(!confirm('Purge individual tracking ticket? Operation destructive.')) return;
  try {
    const res = await fetch(`/api/projects/${currentProject.id}/tasks/${currentTask.id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    if(res.ok) {
      toast('Ticket array row deleted.', 'success');
      closeOverlay('taskOverlay');
    }
  } catch(err) { toast('Purge configuration halted.', 'error'); }
}

async function loadComments(taskId) {
  try {
    const res = await fetch(`/api/tasks/${taskId}/comments`, {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    const data = await res.json();
    const list = document.getElementById('tModalCommentList');
    list.innerHTML = '';
    
    const comments = data.comments || [];
    if(comments.length === 0) {
      list.innerHTML = `<div style="padding:12px;text-align:center;color:var(--text-3);font-size:12px">No discussion streams opened.</div>`;
      return;
    }

    comments.forEach(c => {
      const el = document.createElement('div');
      el.className = 'comment-item';
      el.innerHTML = `
        <div class="avatar avatar-sm">${c.user_avatar || '👤'}</div>
        <div class="comment-bubble">
          <div class="comment-author-row">
            <span class="comment-author">${c.user_name}</span>
            <span class="comment-time">${c.created_at}</span>
          </div>
          <div class="comment-text">${c.content}</div>
        </div>
      `;
      list.appendChild(el);
    });
    list.scrollTop = list.scrollHeight;
  } catch(err) {}
}

async function submitComment() {
  const box = document.getElementById('tModalCommentInput');
  const content = box.value.trim();
  if(!content) return;

  try {
    const res = await fetch(`/api/tasks/${currentTask.id}/comments`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('token')}`
      },
      body: JSON.stringify({ content })
    });
    if(res.ok) {
      box.value = '';
      loadComments(currentTask.id);
    }
  } catch(err) {}
}

// ── TEAM MEMBERS MODULE REDIRECT ──
function openMembersModal() {
  document.getElementById('memMsg').innerHTML = '';
  document.getElementById('memberSearchInput').value = '';
  document.getElementById('memberSearchResults').style.display = 'none';
  openOverlay('membersOverlay');
  renderCurrentMembers();
}

function renderCurrentMembers() {
  const list = document.getElementById('currentMembersList');
  list.innerHTML = '';
  currentProject.members.forEach(m => {
    const item = document.createElement('div');
    item.className = 'member-item';
    item.innerHTML = `
      <div class="avatar avatar-sm">${m.avatar || '👤'}</div>
      <div class="member-info">
        <div class="member-name">${m.name}</div>
        <div class="member-role">${m.role}</div>
      </div>
      ${m.role !== 'owner' ? `<button class="btn btn-ghost btn-sm text-red" onclick="removeMember(${m.id})">Purge</button>` : ''}
    `;
    list.appendChild(item);
  });
}

async function handleMemberSearch(query) {
  const resultsEl = document.getElementById('memberSearchResults');
  if(!query || query.trim().length < 2) { resultsEl.style.display = 'none'; return; }

  try {
    const res = await fetch(`/api/users/search?q=${encodeURIComponent(query)}`, {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    const data = await res.json();
    const users = data.users || [];
    
    resultsEl.innerHTML = '';
    if(users.length === 0) {
      resultsEl.innerHTML = `<div style="padding:10px;font-size:12px;color:var(--text-3)">No workspace profile identity matches.</div>`;
    } else {
      users.forEach(u => {
        const el = document.createElement('div');
        el.className = 'search-result-item';
        el.onclick = () => addMember(u.id);
        el.innerHTML = `<div class="avatar avatar-sm">${u.avatar || '👤'}</div><div>${u.name} (${u.email})</div>`;
        resultsEl.appendChild(el);
      });
    }
    resultsEl.style.display = 'block';
  } catch(err) {}
}

async function addMember(userId) {
  document.getElementById('memberSearchResults').style.display = 'none';
  document.getElementById('memberSearchInput').value = '';
  try {
    const res = await fetch(`/api/projects/${currentProject.id}/members`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('token')}`
      },
      body: JSON.stringify({ user_id: userId })
    });
    if(res.ok) {
      toast('Workspace tracking access granted.', 'success');
      // Re-trigger sync
      const token = localStorage.getItem('token');
      const pRes = await fetch(`/api/projects/${currentProject.id}`, { headers: { 'Authorization': `Bearer ${token}` } });
      const pData = await pRes.json();
      currentProject.members = pData.members;
      renderCurrentMembers();
      loadProjects();
    } else {
      const data = await res.json();
      document.getElementById('memMsg').innerHTML = `<div class="msg error">${data.error || 'Access sync execution failure.'}</div>`;
    }
  } catch(err) {}
}

async function removeMember(userId) {
  if(!confirm('Revoke workspace operational profile authorization permissions?')) return;
  try {
    const res = await fetch(`/api/projects/${currentProject.id}/members/${userId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    if(res.ok) {
      toast('Workspace identity cluster allocation stripped.', 'success');
      const token = localStorage.getItem('token');
      const pRes = await fetch(`/api/projects/${currentProject.id}`, { headers: { 'Authorization': `Bearer ${token}` } });
      const pData = await pRes.json();
      currentProject.members = pData.members;
      renderCurrentMembers();
      loadProjects();
    }
  } catch(err) {}
}

// ── NOTIFICATIONS CENTRE ──
function toggleNotifPanel(e) {
  e.stopPropagation();
  const el = document.getElementById('notifPanel');
  el.classList.toggle('open');
}

window.addEventListener('click', () => {
  document.getElementById('notifPanel').classList.remove('open');
});
document.getElementById('notifPanel').addEventListener('click', e => e.stopPropagation());

async function loadNotifications() {
  try {
    const res = await fetch('/api/notifications', {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    const data = await res.json();
    const list = document.getElementById('notifList');
    const badge = document.getElementById('notifBadge');
    
    const notifications = data.notifications || [];
    const unread = notifications.filter(n => !n.is_read);

    if(unread.length > 0) {
      badge.textContent = unread.length;
      badge.style.display = 'flex';
    } else {
      badge.style.display = 'none';
    }

    list.innerHTML = '';
    if(notifications.length === 0) {
      list.innerHTML = `<div style="padding:24px;text-align:center;font-size:13px;color:var(--text-3)">Notifications history clean.</div>`;
      return;
    }

    notifications.forEach(n => {
      const item = document.createElement('div');
      item.className = `notif-item ${!n.is_read ? 'unread' : ''}`;
      item.onclick = () => {
        if(n.link_id && activeView === 'board') openTaskDetailsModal(n.link_id);
        document.getElementById('notifPanel').classList.remove('open');
      };
      item.innerHTML = `
        ${!n.is_read ? '<div class="notif-dot"></div>' : ''}
        <div class="notif-text">
          <div>${n.message}</div>
          <div class="notif-time">${n.created_at}</div>
        </div>
      `;
      list.appendChild(item);
    });
  } catch(err) {}
}

async function markRead() {
  try {
    await fetch('/api/notifications/read', {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    loadNotifications();
  } catch(err) {}
}

// Global initialization startup loop trigger execution engine
window.addEventListener('DOMContentLoaded', initApp);
</script>
