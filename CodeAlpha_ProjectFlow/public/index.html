<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProjectFlow Dashboard</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-surface: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg-primary); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

    /* Dashboard Layout */
    .sidebar { width: 260px; background-color: var(--bg-secondary); padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #475569; }
    .sidebar h2 { font-size: 1.5rem; margin-bottom: 20px; color: var(--accent-color); }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    
    .navbar { height: 60px; background-color: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-bottom: 1px solid #475569; }
    .user-profile { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 35px; height: 35px; background: var(--accent-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

    .content-body { flex: 1; padding: 30px; overflow-y: auto; }
    
    /* Kanban Board Layout */
    .board-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px; align-items: start; }
    .board-column { background-color: var(--bg-secondary); border-radius: 8px; padding: 15px; min-height: 500px; }
    .board-column h3 { margin-bottom: 15px; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
    
    /* Task Cards */
    .task-card { background-color: var(--bg-surface); padding: 15px; border-radius: 6px; margin-bottom: 12px; cursor: pointer; transition: transform 0.2s; border-left: 4px solid var(--accent-color); }
    .task-card:hover { transform: translateY(-2px); }
    .task-card h4 { margin-bottom: 8px; font-size: 1.05rem; }
    .task-card p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px; }
    .task-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; }
    .priority-badge { padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
    .priority-high { background-color: rgba(239, 68, 68, 0.2); color: var(--danger); }
    .priority-medium { background-color: rgba(245, 158, 11, 0.2); color: var(--warning); }
    .priority-low { background-color: rgba(16, 185, 129, 0.2); color: var(--success); }

    /* Forms & Inputs */
    button { background-color: var(--accent-color); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 500; }
    button:hover { background-color: var(--accent-hover); }
    .btn-danger { background-color: var(--danger); }
    .btn-danger:hover { background-color: #dc2626; }
    .btn-secondary { background-color: transparent; border: 1px solid var(--text-muted); color: var(--text-main); }
    .btn-secondary:hover { background-color: rgba(255, 255, 255, 0.05); }
    
    input, select, textarea { width: 100%; padding: 10px; background-color: var(--bg-primary); border: 1px solid #475569; color: white; border-radius: 4px; margin-bottom: 15px; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent-color); outline: none; }

    /* Modals Overlay (Fixes the Screenshot 2026-05-24 110741.png structure drop) */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background-color: var(--bg-secondary); padding: 25px; border-radius: 8px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; border: 1px solid #475569; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .close-btn { background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
    .close-btn:hover { color: white; }

    /* Comments Section */
    .comments-wrapper { margin-top: 20px; border-top: 1px solid #475569; padding-top: 15px; }
    .comment-item { background: var(--bg-primary); padding: 10px; border-radius: 4px; margin-bottom: 8px; font-size: 0.9rem; }
    .comment-meta { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
  </style>
</head>
<body>

  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <h2>ProjectFlow</h2>
    <div style="margin-bottom: 20px;">
      <button onclick="openModal('projectModal')">+ New Project</button>
    </div>
    <div id="projectListLayout" style="display: flex; flex-direction: column; gap: 8px;">
      <!-- System rendered projects links inject here -->
    </div>
  </aside>

  <!-- Main View Area -->
  <main class="main-content">
    <header class="navbar">
      <h2 id="activeProjectTitle">Select or Create a Project</h2>
      <div class="user-profile">
        <button onclick="openModal('memberModal')" id="manageMembersBtn" style="display:none; margin-right: 10px;">Members</button>
        <button onclick="openModal('taskModal')" id="createTaskBtn" style="display:none; margin-right: 20px;">+ Add Task</button>
        <div class="avatar" id="userAvatarContainer">U</div>
        <span id="userNameSpan">Loading Session...</span>
      </div>
    </header>

    <div class="content-body">
      <div class="board-container" id="kanbanBoardWrapper" style="display: none;">
        <!-- To Do Column -->
        <div class="board-column">
          <h3>To Do</h3>
          <div id="col-todo"></div>
        </div>
        <!-- In Progress Column -->
        <div class="board-column">
          <h3>In Progress</h3>
          <div id="col-inprogress"></div>
        </div>
        <!-- In Review Column -->
        <div class="board-column">
          <h3>In Review</h3>
          <div id="col-inreview"></div>
        </div>
        <!-- Done Column -->
        <div class="board-column">
          <h3>Done</h3>
          <div id="col-done"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- MODAL: Create New Project -->
  <div class="modal-overlay" id="projectModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Create Project Workspace</h3>
        <button class="close-btn" onclick="closeModal('projectModal')">&times;</button>
      </div>
      <form id="projectForm">
        <label>Project Title</label>
        <input type="text" id="projTitle" placeholder="Project Name" required>
        <label>Description</label>
        <textarea id="projDesc" placeholder="Enter workspace notes..."></textarea>
        <label>Color Theme Flag</label>
        <input type="color" id="projColor" value="#6366f1">
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
          <button type="button" class="btn-secondary" onclick="closeModal('projectModal')">Cancel</button>
          <button type="submit">Create Workspace</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL: Add New Task -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>New Task Allocation</h3>
        <button class="close-btn" onclick="closeModal('taskModal')">&times;</button>
      </div>
      <form id="taskForm">
        <label>Task Title</label>
        <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
        <label>Description</label>
        <textarea id="taskDesc" placeholder="Provide extra details..."></textarea>
        <label>Priority</label>
        <select id="taskPriority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <label>Due Date</label>
        <input type="date" id="taskDueDate">
        <label>Assignee</label>
        <select id="taskAssignee">
          <option value="">Unassigned</option>
        </select>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
          <button type="button" class="btn-secondary" onclick="closeModal('taskModal')">Cancel</button>
          <button type="submit">Create Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL: Task Details View & Updates (Matches screenshot functionality completely) -->
  <div class="modal-overlay" id="taskDetailsModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Task Details Card</h3>
        <button class="close-btn" onclick="closeModal('taskDetailsModal')">&times;</button>
      </div>
      <form id="updateTaskForm">
        <input type="hidden" id="detailsTaskId">
        <label>Task Title</label>
        <input type="text" id="detailsTitle" required>
        <label>Description</label>
        <textarea id="detailsDesc"></textarea>
        
        <label>Update Status</label>
        <select id="detailsStatus">
          <option value="todo">To Do</option>
          <option value="inprogress">In Progress</option>
          <option value="inreview">In Review</option>
          <option value="done">Done</option>
        </select>
        
        <label>Update Priority</label>
        <select id="detailsPriority">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
        
        <label>Change Assignee</label>
        <select id="detailsAssignee">
          <option value="">Unassigned</option>
        </select>
        
        <label>Change Due Date</label>
        <input type="date" id="detailsDueDate">

        <div style="display: flex; gap: 10px; justify-content: space-between; margin-bottom: 20px;">
          <button type="button" class="btn-danger" id="deleteTaskBtn">Delete Task</button>
          <div style="display: flex; gap: 10px;">
            <button type="button" class="btn-secondary" onclick="closeModal('taskDetailsModal')">Cancel</button>
            <button type="submit">Save Changes</button>
          </div>
        </div>
      </form>

      <!-- Integrated Comments Stream Infrastructure -->
      <div class="comments-wrapper">
        <h4>Comments Log</h4>
        <div id="commentsContainer" style="max-height: 150px; overflow-y: auto; margin: 10px 0;"></div>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="newCommentText" placeholder="Write a comment..." style="margin-bottom: 0;">
          <button type="button" id="sendCommentBtn">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL: Workspace Members Registry -->
  <div class="modal-overlay" id="memberModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Project Members</h3>
        <button class="close-btn" onclick="closeModal('memberModal')">&times;</button>
      </div>
      <div style="margin-bottom: 15px;">
        <label>Add Team Member by Email</label>
        <div style="display: flex; gap: 8px;">
          <input type="email" id="inviteEmail" placeholder="colleague@domain.com" style="margin-bottom:0;">
          <button type="button" id="executeInviteBtn">Add</button>
        </div>
      </div>
      <h4>Current Workspace Team</h4>
      <div id="currentMembersContainer" style="margin-top: 10px; display: flex; flex-direction: column; gap: 6px;"></div>
    </div>
  </div>

  <!-- CLIENT WEB ENGINE ARCHITECTURE ENGINE -->
  <script>
    let token = localStorage.getItem('token') || '';
    let currentProjectId = null;
    let ws = null;

    // Direct Authentication Auto Fallback for Rapid Sandbox Testing
    if (!token) {
      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: 'sizuma@rosebankcollege.co.za', password: 'password123' })
      })
      .then(res => res.json())
      .then(data => {
        if(data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.reload();
        }
      });
    } else {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      document.getElementById('userNameSpan').innerText = user.name || 'Active User';
      document.getElementById('userAvatarContainer').innerText = user.avatar || 'U';
      initWebSocket();
      loadProjects();
    }

    function initWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);
      ws.onopen = () => ws.send(JSON.stringify({ type: 'auth', token }));
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if ((msg.type === 'task_created' || msg.type === 'task_updated' || msg.type === 'task_deleted' || msg.type === 'new_comment') && currentProjectId == msg.task?.project_id || currentProjectId) {
          loadTasks(currentProjectId);
          if (msg.type === 'new_comment' && document.getElementById('taskDetailsModal').style.display === 'flex') {
            loadComments(document.getElementById('detailsTaskId').value);
          }
        }
      };
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    async function loadProjects() {
      const res = await fetch('/api/projects', { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      const layout = document.getElementById('projectListLayout');
      layout.innerHTML = '';
      
      data.projects.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'btn-secondary';
        btn.style.textAlign = 'left';
        btn.innerText = `📂 ${p.name}`;
        btn.onclick = () => selectProject(p.id, p.name);
        layout.appendChild(btn);
      });
    }

    function selectProject(id, name) {
      currentProjectId = id;
      document.getElementById('activeProjectTitle').innerText = name;
      document.getElementById('createTaskBtn').style.display = 'block';
      document.getElementById('manageMembersBtn').style.display = 'block';
      document.getElementById('kanbanBoardWrapper').style.display = 'grid';
      loadTasks(id);
      loadWorkspaceUsers();
    }

    async function loadTasks(projectId) {
      const res = await fetch(`/api/projects/${projectId}/tasks`, { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      
      const cols = { todo: 'col-todo', inprogress: 'col-inprogress', inreview: 'col-inreview', done: 'col-done' };
      Object.values(cols).forEach(id => document.getElementById(id).innerHTML = '');

      data.tasks.forEach(t => {
        const card = document.createElement('div');
        card.className = 'task-card';
        card.onclick = () => openTaskDetails(t);
        card.innerHTML = `
          <h4>${t.title}</h4>
          <p>${t.description || 'No descriptive summary text added.'}</p>
          <div class="task-meta">
            <span class="priority-badge priority-${t.priority}">${t.priority}</span>
            <span style="color:var(--text-muted)">👤 ${t.assignee_name || 'Unassigned'}</span>
          </div>
        `;
        document.getElementById(cols[t.status] || 'col-todo').appendChild(card);
      });
    }

    // Modal Form Submissions Mapping Pipeline Rules
    document.getElementById('projectForm').onsubmit = async (e) => {
      e.preventDefault();
      await fetch('/api/projects', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ name: document.getElementById('projTitle').value, description: document.getElementById('projDesc').value, color: document.getElementById('projColor').value })
      });
      closeModal('projectModal');
      loadProjects();
    };

    document.getElementById('taskForm').onsubmit = async (e) => {
      e.preventDefault();
      await fetch(`/api/projects/${currentProjectId}/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({
          title: document.getElementById('taskTitle').value,
          description: document.getElementById('taskDesc').value,
          priority: document.getElementById('taskPriority').value,
          due_date: document.getElementById('taskDueDate').value,
          assignee_id: document.getElementById('taskAssignee').value,
          status: 'todo'
        })
      });
      closeModal('taskModal');
      document.getElementById('taskForm').reset();
    };

    async function openTaskDetails(task) {
      document.getElementById('detailsTaskId').value = task.id;
      document.getElementById('detailsTitle').value = task.title;
      document.getElementById('detailsDesc').value = task.description || '';
      document.getElementById('detailsStatus').value = task.status;
      document.getElementById('detailsPriority').value = task.priority;
      document.getElementById('detailsDueDate').value = task.due_date ? task.due_date.split('T')[0] : '';
      document.getElementById('detailsAssignee').value = task.assignee_id || '';
      
      loadComments(task.id);
      openModal('taskDetailsModal');
    }

    document.getElementById('updateTaskForm').onsubmit = async (e) => {
      e.preventDefault();
      const tId = document.getElementById('detailsTaskId').value;
      await fetch(`/api/projects/${currentProjectId}/tasks/${tId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({
          title: document.getElementById('detailsTitle').value,
          description: document.getElementById('detailsDesc').value,
          status: document.getElementById('detailsStatus').value,
          priority: document.getElementById('detailsPriority').value,
          due_date: document.getElementById('detailsDueDate').value,
          assignee_id: document.getElementById('detailsAssignee').value
        })
      });
      closeModal('taskDetailsModal');
    };

    document.getElementById('deleteTaskBtn').onclick = async () => {
      const tId = document.getElementById('detailsTaskId').value;
      await fetch(`/api/projects/${currentProjectId}/tasks/${tId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      closeModal('taskDetailsModal');
    };

    async function loadComments(taskId) {
      const res = await fetch(`/api/tasks/${taskId}/comments`, { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      const container = document.getElementById('commentsContainer');
      container.innerHTML = '';
      data.comments.forEach(c => {
        container.innerHTML += `
          <div class="comment-item">
            <div class="comment-meta"><strong>${c.user_name}</strong> • ${c.created_at}</div>
            <div>${c.content}</div>
          </div>
        `;
      });
    }

    document.getElementById('sendCommentBtn').onclick = async () => {
      const taskId = document.getElementById('detailsTaskId').value;
      const textInput = document.getElementById('newCommentText');
      if (!textInput.value) return;

      await fetch(`/api/tasks/${taskId}/comments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ content: textInput.value })
      });
      textInput.value = '';
      loadComments(taskId);
    };

    async function loadWorkspaceUsers() {
      const res = await fetch(`/api/projects/${currentProjectId}`, { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      
      const taskAssigneeSelect = document.getElementById('taskAssignee');
      const detailsAssigneeSelect = document.getElementById('detailsAssignee');
      const membersContainer = document.getElementById('currentMembersContainer');
      
      taskAssigneeSelect.innerHTML = '<option value="">Unassigned</option>';
      detailsAssigneeSelect.innerHTML = '<option value="">Unassigned</option>';
      membersContainer.innerHTML = '';

      data.members.forEach(m => {
        const opt = `<option value="${m.id}">${m.name}</option>`;
        taskAssigneeSelect.innerHTML += opt;
        detailsAssigneeSelect.innerHTML += opt;

        membersContainer.innerHTML += `
          <div style="display:flex; justify-content:space-between; align-items:center; background:var(--bg-primary); padding:8px; border-radius:4px;">
            <span>👤 ${m.name} (${m.role})</span>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
